<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開發程序 - 台灣微網科技</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f49bd 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container { max-width: 800px; padding: 40px; text-align: center; }
    h1 { font-size: 48px; margin-bottom: 20px; }
    p { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }
    .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .link {
      background: rgba(255,255,255,0.15);
      padding: 15px 30px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: all 0.3s;
    }
    .link:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .badge { 
      display: inline-block; 
      background: #10b981; 
      padding: 5px 15px; 
      border-radius: 20px; 
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">✅ 已部署</span>
    <h1>台灣微網科技</h1>
    <p>開發程序標準作業程序 (SOP)</p>
    <div class="links">
      <a class="link" href="https://github.com/tingkuanli91-source/development-procedures" target="_blank">GitHub Repo</a>
      <a class="link" href="https://factory-pwr-sys.vercel.app" target="_blank">Factory Power Management</a>
      <a class="link" href="https://energy-mobile.vercel.app" target="_blank">Energy Mobile EMS</a>
    </div>
  </div>
</body>
</html>
